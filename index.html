<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FYSEM RindeGastos</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg">
<meta name="theme-color" content="#1565c0">
<style>
  :root {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    --azul: #1565c0;
    --azul-osc: #0d47a1;
    --azul-claro: #e3f2fd;
    --acento: #00897b;
    --acento-osc: #00695c;
    --acento-claro: #e0f2f1;
    --verde: #2e7d32;
    --verde-osc: #1b5e20;
    --verde-claro: #e8f5e9;
    --ambar: #b26a00;
    --ambar-claro: #fff3e0;
    --rojo: #c62828;
    --gris-borde: #dde2e8;
    --sombra: 0 2px 10px rgba(15, 40, 80, .07);
    --sombra-fuerte: 0 8px 28px rgba(15, 40, 80, .18);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: #eef1f6; color: #16202c; padding-bottom: 48px; -webkit-tap-highlight-color: transparent; }

  header { background: linear-gradient(135deg, var(--azul) 0%, var(--azul-osc) 100%); color: #fff; padding: 18px 16px 14px; position: relative; overflow: hidden; }
  header::after { content: ""; position: absolute; right: -30px; top: -40px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.08); }
  header h1 { margin: 0; font-size: 1.15rem; letter-spacing: -.01em; }
  #subtitulo-paso { margin: 5px 0 0; font-size: .8rem; opacity: .92; }

  #progreso { display: flex; gap: 6px; max-width: 560px; margin: 12px auto 0; }
  .paso { flex: 1; text-align: center; cursor: pointer; }
  .paso-barra { height: 4px; border-radius: 4px; background: rgba(255,255,255,.28); overflow: hidden; }
  .paso-barra::after { content: ""; display: block; height: 100%; width: 0%; background: #fff; border-radius: 4px; transition: width .45s cubic-bezier(.4,0,.2,1); }
  .paso.completo .paso-barra::after { width: 100%; }
  .paso.activo .paso-barra::after { width: 55%; }
  .paso-label { font-size: .65rem; color: rgba(255,255,255,.75); margin-top: 5px; text-transform: uppercase; letter-spacing: .04em; transition: color .3s; }
  .paso.completo .paso-label, .paso.activo .paso-label { color: #fff; font-weight: 600; }

  main { padding: 16px; max-width: 560px; margin: 0 auto; }

  .pantalla { display: none; animation: entrarPantalla .28s cubic-bezier(.2,.8,.3,1); }
  .pantalla.visible { display: block; }
  @keyframes entrarPantalla { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes entrarTarjeta { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes girar { to { transform: rotate(360deg); } }
  @keyframes pulso { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
  @keyframes destello { 0% { transform: scale(1); } 40% { transform: scale(1.04); } 100% { transform: scale(1); } }

  section { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: var(--sombra); border: 1px solid rgba(15,40,80,.04); }
  section h2 { font-size: .82rem; margin: 0 0 14px; color: var(--azul); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }

  label { display: block; font-size: .82rem; font-weight: 600; margin: 12px 0 5px; color: #33404d; }
  input, select {
    width: 100%; padding: 11px 12px; border: 1.5px solid var(--gris-borde); border-radius: 10px;
    font-size: .96rem; background: #fbfcfe; color: #16202c; transition: border-color .18s, box-shadow .18s, background .18s;
  }
  input:focus, select:focus { outline: none; border-color: var(--azul); box-shadow: 0 0 0 3px rgba(21,101,192,.12); background: #fff; }
  input.invalido { border-color: var(--rojo); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  button { cursor: pointer; border: none; border-radius: 10px; font-weight: 600; font-family: inherit; transition: transform .12s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease; }
  button:active { transform: scale(.96); }

  .nav-botones { display: flex; gap: 10px; margin-top: 4px; }
  .btn-atras { flex: 1; padding: 14px; background: #fff; border: 1.5px solid var(--gris-borde); color: #4a5a68; font-size: .95rem; }
  .btn-atras:hover { background: #f5f7fa; }
  .btn-continuar {
    flex: 2; padding: 14px; background: linear-gradient(135deg, var(--azul) 0%, var(--azul-osc) 100%);
    color: #fff; font-size: 1rem; box-shadow: 0 6px 16px rgba(21,101,192,.32);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-continuar:disabled { background: #c3cad3; box-shadow: none; cursor: not-allowed; }

  #btn-agregar-gasto-grande {
    width: 100%; padding: 16px; background: linear-gradient(135deg, var(--acento) 0%, var(--acento-osc) 100%);
    color: #fff; font-size: 1.05rem; box-shadow: 0 6px 16px rgba(0,137,123,.35); margin-bottom: 16px;
  }
  #btn-agregar-gasto-grande:hover { box-shadow: 0 8px 22px rgba(0,137,123,.45); }

  .btn-foto { padding: 13px 8px; background: var(--azul-claro); color: var(--azul); font-size: .84rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-foto:hover { background: #d3e8fb; }
  .btn-foto.recien-elegida { background: var(--verde-claro); color: var(--verde); animation: destello .5s ease; }

  #btn-guardar-gasto { width: 100%; margin-top: 16px; padding: 14px; background: var(--acento); color: #fff; font-size: .98rem; box-shadow: 0 5px 14px rgba(0,137,123,.3); }
  #btn-cancelar-gasto { width: 100%; margin-top: 8px; padding: 12px; background: #f0f2f5; color: #4a5a68; font-size: .9rem; }

  #btn-enviar {
    flex: 2; padding: 15px; background: linear-gradient(135deg, var(--verde) 0%, var(--verde-osc) 100%);
    color: #fff; font-size: 1.05rem; box-shadow: 0 6px 16px rgba(46,125,50,.35);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  #btn-enviar:disabled { background: #c3cad3; box-shadow: none; cursor: not-allowed; }
  #btn-enviar.cargando { opacity: .85; pointer-events: none; }
  .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: girar .7s linear infinite; display: none; }
  #btn-enviar.cargando .spinner { display: inline-block; }

  .gasto-card {
    border: 1px solid var(--gris-borde); border-radius: 12px; padding: 12px 14px; margin-top: 10px;
    animation: entrarTarjeta .32s cubic-bezier(.2,.8,.3,1) both; background: #fbfcfe;
  }
  .gasto-card-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .gasto-card-header strong { font-size: .92rem; }
  .gasto-card-body { font-size: .82rem; color: #5b6b7a; margin-top: 4px; }
  .gasto-card-body .monto { color: var(--azul); font-weight: 700; }
  .btn-quitar { background: none; color: var(--rojo); font-size: 1rem; padding: 4px 9px; border-radius: 8px; line-height: 1; flex-shrink: 0; }
  .btn-quitar:hover { background: #fdecea; }

  .lista-vacia { text-align: center; color: #8a97a3; font-size: .85rem; padding: 18px 8px; }

  .resumen-fila { display: flex; justify-content: space-between; font-size: .9rem; padding: 5px 0; }
  .resumen-fila .etiqueta { color: #5b6b7a; }
  .resumen-fila .valor { font-weight: 600; }
  .resumen-total { border-top: 1px dashed var(--gris-borde); margin-top: 8px; padding-top: 10px; font-size: 1rem; }
  .resumen-total .valor { font-size: 1.2rem; font-weight: 800; }
  .saldo-positivo { color: var(--verde); }
  .saldo-negativo { color: var(--rojo); }

  #estado-sync { font-size: .84rem; margin-top: 12px; padding: 12px 14px; border-radius: 12px; min-height: 1em; transition: background .25s, color .25s; display: none; }
  #estado-sync:not(:empty) { display: block; }
  #estado-sync.info { background: var(--azul-claro); color: var(--azul-osc); }
  #estado-sync.exito { background: var(--verde-claro); color: var(--verde); }
  #estado-sync.alerta { background: var(--ambar-claro); color: var(--ambar); }

  #ocr-status { font-size: .8rem; margin-top: 6px; min-height: 1.1em; transition: color .25s; font-weight: 600; }
  #ocr-status.leyendo { color: var(--azul); animation: pulso 1.1s ease-in-out infinite; }
  #ocr-status.exito { color: var(--verde); }
  #ocr-status.info { color: #8a6d00; }
  #ocr-status.error { color: var(--rojo); }

  .hint { font-size: .74rem; color: #8a97a3; margin-top: 4px; line-height: 1.35; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,20,35,.5); display: flex; align-items: flex-end;
    justify-content: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .modal-overlay.abierto { opacity: 1; pointer-events: auto; }
  .modal-box {
    background: #fff; border-radius: 20px 20px 0 0; padding: 22px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%; max-width: 560px; box-shadow: var(--sombra-fuerte); transform: translateY(100%); transition: transform .28s cubic-bezier(.2,.8,.3,1);
  }
  .modal-overlay.abierto .modal-box { transform: translateY(0); }
  .modal-box::before { content: ""; display: block; width: 40px; height: 4px; background: #dde2e8; border-radius: 4px; margin: 0 auto 16px; }
  .modal-titulo { font-size: 1rem; font-weight: 700; margin: 0 0 6px; color: #16202c; }
  .modal-mensaje { font-size: .9rem; color: #4a5a68; margin: 0 0 20px; line-height: 1.45; }
  .modal-botones { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 13px; font-size: .95rem; border-radius: 12px; }
  .modal-btn-cancelar { background: #f0f2f5; color: #4a5a68; }
  .modal-btn-confirmar { background: linear-gradient(135deg, var(--azul) 0%, var(--azul-osc) 100%); color: #fff; box-shadow: 0 5px 14px rgba(21,101,192,.32); }

  @media (max-width: 380px) { .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>FYSEM RindeGastos</h1>
  <p id="subtitulo-paso">Paso 1 de 3 · Datos del viaje</p>
  <div id="progreso">
    <div class="paso" id="paso-1" data-paso="1"><div class="paso-barra"></div><div class="paso-label">Viaje</div></div>
    <div class="paso" id="paso-2" data-paso="2"><div class="paso-barra"></div><div class="paso-label">Gastos</div></div>
    <div class="paso" id="paso-3" data-paso="3"><div class="paso-barra"></div><div class="paso-label">Enviar</div></div>
  </div>
</header>

<main>
  <!-- ===== PASO 1: Datos del viaje ===== -->
  <div class="pantalla" id="pantalla-1">
    <section>
      <h2>Datos del viaje</h2>
      <label for="viaje-jefe">Jefe de grupo (responsable) *</label>
      <input id="viaje-jefe">

      <label for="viaje-orden">Orden de trabajo</label>
      <input id="viaje-orden">

      <label for="viaje-obra">Obra / Planta / Proyecto</label>
      <input id="viaje-obra">

      <label for="viaje-destino">Ciudad / Destino *</label>
      <input id="viaje-destino">

      <label for="viaje-centro-costo">Centro de costo (ERP) — confirmar con tesorería</label>
      <input id="viaje-centro-costo">

      <div class="row2">
        <div>
          <label for="viaje-fecha-salida">Fecha de salida *</label>
          <input type="date" id="viaje-fecha-salida">
        </div>
        <div>
          <label for="viaje-fecha-retorno">Fecha de retorno prevista</label>
          <input type="date" id="viaje-fecha-retorno">
        </div>
      </div>

      <label for="viaje-participantes">Participantes (nombres completos, separados por coma) *</label>
      <input id="viaje-participantes">

      <div class="row2">
        <div>
          <label for="viaje-num-participantes">N° de participantes</label>
          <input type="number" id="viaje-num-participantes" min="1">
        </div>
        <div>
          <label for="viaje-bolsa">Bolsa entregada (S/)</label>
          <input type="number" id="viaje-bolsa" step="0.01" min="0">
        </div>
      </div>
    </section>
    <div class="nav-botones">
      <button type="button" class="btn-continuar" id="btn-ir-paso-2" style="flex: 1;">Continuar →</button>
    </div>
  </div>

  <!-- ===== PASO 2: Gastos (lista) ===== -->
  <div class="pantalla" id="pantalla-2">
    <button type="button" id="btn-agregar-gasto-grande">＋ Agregar gasto</button>
    <section>
      <h2>Registrados en este viaje</h2>
      <div id="lista-gastos"></div>
    </section>
    <div class="nav-botones">
      <button type="button" class="btn-atras" id="btn-volver-paso-1">← Viaje</button>
      <button type="button" class="btn-continuar" id="btn-ir-paso-3">Revisar y enviar →</button>
    </div>
  </div>

  <!-- ===== PASO 2b: Formulario de gasto ===== -->
  <div class="pantalla" id="pantalla-gasto">
    <section>
      <h2>Nuevo gasto</h2>
      <label>Evidencia (foto del comprobante o Yape)</label>
      <div class="row2">
        <button type="button" id="btn-tomar-foto" class="btn-foto">📷 Tomar foto</button>
        <button type="button" id="btn-elegir-foto" class="btn-foto">🖼️ Elegir de galería</button>
      </div>
      <input type="file" id="gasto-foto-camara" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="gasto-foto-galeria" accept="image/*" style="display:none">
      <p id="foto-nombre" class="hint"></p>
      <p class="hint">Al agregar la foto, se intenta leer fecha y monto solos.</p>
      <p id="ocr-status"></p>

      <label for="gasto-fecha">Fecha del gasto</label>
      <input type="date" id="gasto-fecha">

      <label for="gasto-concepto">Concepto (qué se compró)</label>
      <input id="gasto-concepto">

      <label for="gasto-categoria">Categoría</label>
      <select id="gasto-categoria"></select>

      <label for="gasto-monto">Monto (S/) — verifica el valor detectado</label>
      <input type="number" id="gasto-monto" step="0.01" min="0">

      <label for="gasto-tipo-doc">Tipo de documento (para ERP)</label>
      <select id="gasto-tipo-doc"></select>

      <button type="button" id="btn-guardar-gasto">Guardar gasto</button>
      <button type="button" id="btn-cancelar-gasto">Cancelar</button>
    </section>
  </div>

  <!-- ===== PASO 3: Confirmar y enviar ===== -->
  <div class="pantalla" id="pantalla-3">
    <section>
      <h2>Viaje</h2>
      <div id="resumen-viaje"></div>
    </section>
    <section>
      <h2>Cuadre</h2>
      <div class="resumen-fila"><span class="etiqueta">Bolsa entregada</span><span class="valor" id="resumen-bolsa">S/ 0.00</span></div>
      <div class="resumen-fila"><span class="etiqueta">Total gastado (<span id="resumen-num-gastos">0</span>)</span><span class="valor" id="resumen-gastado">S/ 0.00</span></div>
      <div class="resumen-fila resumen-total"><span class="etiqueta">Saldo</span><span class="valor" id="resumen-saldo">S/ 0.00</span></div>
    </section>
    <section>
      <h2>Gastos incluidos</h2>
      <div id="resumen-gastos"></div>
    </section>
    <div class="nav-botones">
      <button type="button" class="btn-atras" id="btn-volver-paso-2">←</button>
      <button type="button" id="btn-enviar">
        <span class="spinner"></span>
        <span>Enviar rendición</span>
      </button>
    </div>
    <div id="estado-sync"></div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <p class="modal-titulo" id="modal-titulo">Confirmar</p>
    <p class="modal-mensaje" id="modal-mensaje"></p>
    <div class="modal-botones">
      <button type="button" class="modal-btn modal-btn-cancelar" id="modal-cancelar">Cancelar</button>
      <button type="button" class="modal-btn modal-btn-confirmar" id="modal-confirmar">Sí, confirmar</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
